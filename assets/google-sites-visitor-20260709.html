<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Sites visitor counter</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin: 0 8px 8px 0;
    }

    .vc {
      width: 96px;
      box-sizing: border-box;
      padding: 5px 6px 6px;
      color: #555;
      font-size: 11px;
      line-height: 1.12;
      background: #fff;
      border-top: 1px solid #9c9c9c;
      border-bottom: 1px solid #9c9c9c;
    }

    .h {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      margin-bottom: 2px;
      color: #555;
      font-size: 12px;
      font-weight: 700;
    }

    .i {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      width: 14px;
      height: 17px;
    }

    .i span {
      display: block;
      width: 3px;
      background: #6b6b6b;
    }

    .i span:nth-child(1) {
      height: 10px;
    }

    .i span:nth-child(2) {
      height: 15px;
    }

    .i span:nth-child(3) {
      height: 7px;
    }

    .l {
      white-space: nowrap;
    }

    .link {
      font-size: 12px;
      line-height: 1;
      color: #4d43c8;
      text-decoration: underline;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="vc" aria-label="Visitor statistics">
      <div class="h">
        <span class="i" aria-hidden="true"><span></span><span></span><span></span></span>
        <span>Visitors</span>
      </div>
      <div class="l">Total: <span data-total>...</span></div>
      <div class="l">Today: <span data-today>...</span></div>
      <div class="l">Yesterday: <span data-yesterday>...</span></div>
    </aside>
    <a class="link" href="https://hitscounter.dev/" target="_blank" rel="noopener">Webstatcounter</a>
  </div>
  <script>
    (function () {
      var trackedUrl = "https://sites.google.com/view/key9912/home";
      var encodedUrl = encodeURIComponent(trackedUrl);
      var timezone = "Asia/Seoul";
      var apiBase = "https://hitscounter.dev/api";
      var countedKey = "key9912GoogleSitesVisitorLastCountedDate";
      var probeKey = "key9912GoogleSitesStorageProbe";

      function setText(selector, value) {
        var node = document.querySelector(selector);
        if (node) node.textContent = value == null ? "0" : String(value);
      }

      function day(offset) {
        var date = new Date();
        date.setDate(date.getDate() + offset);
        var parts = new Intl.DateTimeFormat("en-US", {
          timeZone: timezone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        }).formatToParts(date);
        var values = {};
        parts.forEach(function (part) {
          values[part.type] = part.value;
        });
        return values.year + "-" + values.month + "-" + values.day;
      }

      function cookieValue() {
        try {
          var match = document.cookie.match(new RegExp("(?:^|; )" + countedKey + "=([^;]*)"));
          return match ? decodeURIComponent(match[1]) : null;
        } catch (error) {
          return null;
        }
      }

      function setCookie(value) {
        try {
          document.cookie = countedKey + "=" + encodeURIComponent(value) + "; Max-Age=31536000; Path=/; SameSite=Lax";
          return cookieValue() === value;
        } catch (error) {
          return false;
        }
      }

      function storage() {
        try {
          window.localStorage.setItem(probeKey, "1");
          if (window.localStorage.getItem(probeKey) === "1") return window.localStorage;
        } catch (error) {}

        try {
          window.sessionStorage.setItem(probeKey, "1");
          if (window.sessionStorage.getItem(probeKey) === "1") return window.sessionStorage;
        } catch (error) {}

        return null;
      }

      function renderHistory(fallback) {
        return fetch(apiBase + "/history?url=" + encodedUrl)
          .then(function (response) {
            return response.json();
          })
          .then(function (json) {
            var history = json.history || [];
            var today = day(0);
            var yesterday = day(-1);
            var todayRow = history.find(function (row) {
              return String(row.hit_date).slice(0, 10) === today;
            });
            var yesterdayRow = history.find(function (row) {
              return String(row.hit_date).slice(0, 10) === yesterday;
            });
            setText("[data-total]", json.total_hits != null ? json.total_hits : fallback.total_hits);
            setText("[data-today]", todayRow ? todayRow.hit_count : 0);
            setText("[data-yesterday]", yesterdayRow ? yesterdayRow.hit_count : 0);
          });
      }

      var today = day(0);
      var store = storage();
      var seenCookie = cookieValue() === today;
      var seenStore = store ? store.getItem(countedKey) === today : false;
      var canRemember = !!store || setCookie(today);
      var shouldHit = canRemember && !seenCookie && !seenStore;

      if (shouldHit) {
        if (store) store.setItem(countedKey, today);
        setCookie(today);
      }

      fetch(shouldHit
        ? apiBase + "/hit?output=json&url=" + encodedUrl + "&tz=" + encodeURIComponent(timezone)
        : apiBase + "/history?url=" + encodedUrl)
        .then(function (response) {
          return response.json();
        })
        .then(renderHistory)
        .catch(function () {
          setText("[data-total]", "-");
          setText("[data-today]", "-");
          setText("[data-yesterday]", "-");
        });
    })();
  </script>
</body>
</html>
